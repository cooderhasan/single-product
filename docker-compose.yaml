version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: coolify-ecommerce-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-U1uOcMz9bKY10Gujg47xin65SE33UCoEpARDGABBVjiYlUL6LVAOls7w3ygqqaov}
      POSTGRES_DB: ${DB_NAME:-ecommerce}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: coolify-ecommerce-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: coolify-ecommerce-api
    restart: unless-stopped
    expose:
      - "3001"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:U1uOcMz9bKY10Gujg47xin65SE33UCoEpARDGABBVjiYlUL6LVAOls7w3ygqqaov@postgres:5432/ecommerce?schema=public}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - JWT_SECRET=${JWT_SECRET}
      - PAYTR_MERCHANT_ID=${PAYTR_MERCHANT_ID}
      - PAYTR_MERCHANT_KEY=${PAYTR_MERCHANT_KEY}
      - PAYTR_MERCHANT_SALT=${PAYTR_MERCHANT_SALT}
      - PORT=3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.360sehpa.com`)"
      - "traefik.http.services.api.loadbalancer.server.port=3001"
      - "coolify.managed=true"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: coolify-ecommerce-web
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL}
      - PORT=3000
    depends_on:
      - api
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web.rule=Host(`360sehpa.com`)"
      - "traefik.http.services.web.loadbalancer.server.port=3000"
      - "coolify.managed=true"

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    container_name: coolify-ecommerce-admin
    restart: unless-stopped
    expose:
      - "3002"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - PORT=3002
    depends_on:
      - api
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.admin.rule=Host(`admin.360sehpa.com`)"
      - "traefik.http.services.admin.loadbalancer.server.port=3002"
      - "coolify.managed=true"

volumes:
  postgres_data:
  redis_data:
